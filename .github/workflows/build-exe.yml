name: Build Notify.exe

on:
  workflow_dispatch:   # lets you trigger it manually with a button
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build exe
        run: |
          pyinstaller --onefile --noconsole --name Notify notify.py

      - name: Upload built exe
        uses: actions/upload-artifact@v4
        with:
          name: Notify-exe
          path: dist/Notify.exe
