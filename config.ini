[Discord]
; Paste your Discord webhook URL here (Server Settings > Integrations > Webhooks)
webhook_url = 

; The name shown as the sender in Discord
username = Notify Bot

; Optional: URL to an image used as the bot's avatar. Leave blank to use Discord's default.
avatar_url = 

[General]
; Custom name for this PC, shown in every notification (e.g. "Living Room", "Gaming Rig")
pc_name = My-PC

; Log file name (relative to Notify.exe) or a full path like C:\Logs\notify_log.txt
log_file = notify_log.txt

[Mention]
; Set to true to ping a specific person on every notification (guarantees a
; mobile push regardless of that channel's "All Messages" setting)
enabled = false

; Discord USER ID (not username) of the person to ping, e.g. 123456789012345678
; To get it: Discord Settings > Advanced > enable Developer Mode,
; then right-click your name anywhere > Copy User ID
; Discord will automatically display it as their current name/nickname (e.g. @._carbon_)
user_id = 
